<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polar H10 Monitor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0b0f19;
            color: #ffffff;
        }
        .card {
            text-align: center;
            background: #161b26;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 280px;
        }
        h1 {
            font-size: 20px;
            color: #8f9cae;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bpm-display {
            font-size: 72px;
            font-weight: 800;
            color: #ff3b30;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #007aff;
            color: white;
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #0056b3;
        }
        #status {
            font-size: 14px;
            color: #64748b;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Polar H10</h1>
        <div class="bpm-display" id="bpm">--</div>
        <button id="connectBtn" onclick="connectPolar()">Connect Sensor</button>
        <p id="status">Disconnected</p>
    </div>

    <script>
        const bpmElement = document.getElementById('bpm');
        const statusElement = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');

        async function connectPolar() {
            try {
                statusElement.innerText = "Searching...";
                
                // Request any BLE device broadcasting the Heart Rate Service
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['heart_rate'] }]
                });

                statusElement.innerText = "Connecting to device...";
                const server = await device.gatt.connect();

                statusElement.innerText = "Connecting to Heart Rate Service...";
                const service = await server.getPrimaryService('heart_rate');

                statusElement.innerText = "Locating measurement profile...";
                const characteristic = await service.getCharacteristic('heart_rate_measurement');

                statusElement.innerText = "Starting live data stream...";
                await characteristic.startNotifications();
                
                // Handle live data changes coming from the Polar H10
                characteristic.addEventListener('characteristicvaluechanged', handleHeartRateChange);

                statusElement.innerText = "Connected!";
                connectBtn.style.display = 'none'; // Hide button once paired
                
                // Update interface if disconnected manually or wanders out of range
                device.addEventListener('gattserverdisconnected', () => {
                    bpmElement.innerText = "--";
                    statusElement.innerText = "Disconnected";
                    connectBtn.style.display = 'block';
                });

            } catch (error) {
                console.error(error);
                statusElement.innerText = "Error: " + error.message;
            }
        }

        function handleHeartRateChange(event) {
            const value = event.target.value;
            
            // Standard Bluetooth profile specification parsing
            const flags = value.getUint8(0);
            const is16Bit = flags & 0x01;
            
            let heartRate;
            if (is16Bit) {
                heartRate = value.getUint16(1, true); // 16-bit BPM format
            } else {
                heartRate = value.getUint8(1);        // standard 8-bit format
            }
            
            // Render to the interface screen
            bpmElement.innerText = heartRate;
        }
    </script>

</body>
</html>
