<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS 19 Haptic Test</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f0f0f0;
            touch-action: manipulation; /* Prevents zoom on double tap */
        }

        /* The visible button container */
        .haptic-btn {
            position: relative;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: #007aff;
            border-radius: 14px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
            overflow: hidden; /* Ensures click area is clipped */
        }

        .haptic-btn:active {
            background: #0056b3;
            transform: scale(0.98);
        }

        /* The Invisible Native Switch */
        /* This sits exactly on top of the button. When you tap the button, 
           you are actually tapping this input, which triggers the haptic. */
        .native-switch {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0; /* Invisible */
            appearance: none; /* Reset default look */
            -webkit-appearance: none;
            margin: 0;
            cursor: pointer;
            /* Crucial: clip-path ensures the hit area matches the rounded button */
            clip-path: inset(0 round 14px); 
            z-index: 10;
        }

        p {
            margin-top: 25px;
            color: #555;
            text-align: center;
            font-size: 14px;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <!-- Visible Button -->
    <div class="haptic-btn" id="btn-visual">
        Tap for Haptic
    </div>

    <!-- Invisible Native Input (The actual trigger) -->
    <input type="checkbox" class="native-switch" switch aria-label="Haptic Trigger">

    <p>
        Works on <strong>iOS 18.0 – 19.x</strong>.<br>
        Requires a <strong>direct physical tap</strong>.<br>
        Scripted clicks are blocked in iOS 26.5+.
    </p>

    <script>
        const visualBtn = document.getElementById('btn-visual');
        const nativeSwitch = document.querySelector('.native-switch');

        // Optional: Add visual feedback logic if needed, 
        // but the native switch handles the haptic automatically on 'change' or 'click'.
        
        nativeSwitch.addEventListener('change', (e) => {
            // Reset the switch immediately so it can be tapped again
            // The haptic fires on the initial tap, before this event fully resolves
            setTimeout(() => {
                nativeSwitch.checked = false;
            }, 10);
            
            console.log("Haptic triggered via direct tap");
        });
    </script>
</body>
</html>
