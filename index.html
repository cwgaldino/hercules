<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Haptic Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0b0f19;
            color: #ffffff;
        }
        .card {
            text-align: center;
            background: #161b26;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 280px;
        }
        h1 {
            font-size: 20px;
            color: #8f9cae;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #34c759;
            color: white;
            margin: 10px 0;
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #28a745;
        }
        #status {
            font-size: 14px;
            color: #64748b;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Haptic Hack Test</h1>
        <button onclick="triggerAudioHaptic()">Test Vibe (Audio)</button>
        <p id="status">Tap the button to test</p>
    </div>

    <script>
        const statusElement = document.getElementById('status');

        // A base64-encoded, ultra-low frequency sub-bass pulse audio clip
        const subBassAudioSrc = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
        const audioNode = new Audio(subBassAudioSrc);

        function triggerAudioHaptic() {
            statusElement.innerText = "Playing sub-bass pulse...";
            
            // Rewind to start and play
            audioNode.currentTime = 0;
            audioNode.play()
                .then(() => {
                    statusElement.innerText = "Pulse triggered! Did it vibrate?";
                })
                .catch((error) => {
                    console.error(error);
                    statusElement.innerText = "Audio blocked: " + error.message;
                });
        }
    </script>

</body>
</html>
