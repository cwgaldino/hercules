<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bluefy Console Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; text-align: center; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 30px; text-align: center; max-width: 280px; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            text-align: center;
            background-color: #ff9500; /* Orange Theme */
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.3);
            transition: opacity 0.2s ease;
        }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <h2>📳 Bluefy Console Test</h2>
    <p>This button bypasses web checks and commands Bluefy's system console debugger directly to shake the phone.</p>

    <!-- Haptic Trigger Button -->
    <button id="triggerBtn" class="btn">⚡ Run 3s Local Rumble</button>

    <script>
        const triggerBtn = document.getElementById('triggerBtn');

        // Bypasses missing object wrappers by utilizing Bluefy's continuous debugger listening ports
        function runBluefyConsoleRumble() {
            let duration = 3000; // 3 seconds continuous runtime
            let pulseInterval = 60; // Fires a hard punch pattern every 60 milliseconds
            let elapsed = 0;

            let consoleVibeLoop = setInterval(() => {
                // Direct console bridge pings caught natively by Bluefy's system container wrapper
                console.log("vibrate:heavy");
                console.log("vibrate:click");

                elapsed += pulseInterval;
                if (elapsed >= duration) {
                    clearInterval(consoleVibeLoop);
                }
            }, pulseInterval);
        }

        // Generates a quick 1-second crisp high pitch buzzer alert tone
        function playLocalBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(950, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 1.0);
            } catch (e) {
                console.log("Audio thread error:", e);
            }
        }

        triggerBtn.addEventListener('click', () => {
            playLocalBeep();
            runBluefyConsoleRumble();
        });
    </script>

</body>
</html>
