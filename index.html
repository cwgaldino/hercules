<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Bluefy Callback Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; text-align: center; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 30px; text-align: center; max-width: 280px; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            background-color: #ff9500;
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.3);
        }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <h2>⏱️ Fixed Bluefy Shortcut Test</h2>
    <p>This button triggers GymTimer and forces iOS to bounce straight back to Bluefy instead of Brave.</p>

    <!-- Handoff button -->
    <button id="bluefyTestBtn" class="btn">🚀 Run 3s Timer (Return to Bluefy)</button>

    <script>
        document.getElementById('bluefyTestBtn').addEventListener('click', () => {
            const shortcutName = "GymTimer";
            
            // CRITICAL FIX: We encode Bluefy's system app handle instead of a web URL link.
            // This forces iOS to re-open Bluefy directly instead of default system browsers like Brave.
            const returnToBluefy = "bluefy://";
            
            window.location.href = `shortcuts://x-callback-url/run-shortcut?name=${shortcutName}&x-success=${encodeURIComponent(returnToBluefy)}`;
        });
    </script>

</body>
</html>
