<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous Background Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; text-align: center; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 30px; text-align: center; max-width: 280px; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            text-align: center;
            background-color: #ff9500;
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.3);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>⏱️ Pure Browser Background Test</h2>
    <p>This button runs entirely inside Bluefy. It will NOT open Shortcuts, and it will NOT open Brave.</p>

    <button id="bgTestBtn" class="btn">🚀 Start 3s Background Timer</button>

    <script>
        const bgTestBtn = document.getElementById('bgTestBtn');
        let audioCtx = null;
        let wakeLoopInterval = null;

        // Bypasses the iOS background block by triggering Bluefy's native console haptic driver 
        function runContinuousRumble() {
            let duration = 3000; // 3 seconds
            let pulseRate = 60; // Fires a heavy haptic hit every 60ms
            let elapsed = 0;

            let heavyRumble = setInterval(() => {
                // Pings Bluefy's system console debugger to force hardware vibration
                console.log("vibrate:heavy");
                console.log("vibrate:click");
                
                elapsed += pulseRate;
                if (elapsed >= duration) {
                    clearInterval(heavyRumble);
                }
            }, pulseRate);
        }

        // Creates a loud 1-second finish beep
        function playFinishBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(950, audioCtx.currentTime);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);

        bgTestBtn.addEventListener('click', () => {
            bgTestBtn.disabled = true;
            
            // 1. Initialize and unlock the audio thread while your finger is pressing the glass
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            let timeLeft = 3;
            bgTestBtn.innerText = `⏳ Waiting: ${timeLeft}s`;

            // 2. THE WAKE LOCK: Fires an unhearable microscopic audio pulse every second.
            // This locks the iOS processor open and tells the phone Bluefy is an active media player.
            wakeLoopInterval = setInterval(() => {
                timeLeft--;
                bgTestBtn.innerText = `⏳ Waiting: ${timeLeft}s`;

                // Emit an imperceptible micro-sound to maintain thread authorization
                if (audioCtx && timeLeft > 0) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(0.00001, audioCtx.currentTime); // Sound level effectively zero
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.05);
                }

                // 3. TARGET TIMER HIT ZERO
                if (timeLeft <= 0) {
                    clearInterval(wakeLoopInterval);
                    
                    // Trigger sound and vibration entirely within the app boundaries!
                    playFinishBeep();
                    runContinuousRumble();

                    bgTestBtn.disabled = false;
                    bgTestBtn.innerText = "🚀 Start 3s Background Timer";
                }
            }, 1000);
        });
    </script>

</body>
</html>
