<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Notes</title>
    <!-- Simple iOS App styling -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #1c1c1e;
            font-size: 28px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 1px solid #c7c7cc;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #ffffff;
            resize: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        textarea:focus {
            outline: none;
            border-color: #007aff;
        }
        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #8e8e93;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📝 My Notes</h1>
        <!-- The note input box -->
        <textarea id="noteArea" placeholder="Start typing your notes here..."></textarea>
        <div id="status" class="status">Saved locally</div>
    </div>

    <script>
        const noteArea = document.getElementById('noteArea');
        const status = document.getElementById('status');

        // 1. Load existing notes when the page opens
        window.addEventListener('DOMContentLoaded', () => {
            const savedNotes = localStorage.getItem('myPrivateNotes');
            if (savedNotes) {
                noteArea.value = savedNotes;
            }
        });

        // 2. Automatically save notes as you type (Auto-save)
        noteArea.addEventListener('input', () => {
            status.textContent = 'Saving...';
            
            // Save the text into the browser's storage
            localStorage.setItem('myPrivateNotes', noteArea.value);
            
            // Visual confirmation
            setTimeout(() => {
                status.textContent = 'Saved locally';
            }, 500);
        });
    </script>
</body>
</html>
