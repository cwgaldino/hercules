<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Haptic Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            background-color: #0056b3;
        }
        /* Hide the actual switch input */
        #haptic-switch {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        /* Hide the label used as the trigger proxy */
        #haptic-label {
            display: none;
        }
        p {
            margin-top: 20px;
            color: #666;
            text-align: center;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <button id="trigger-btn">Tap for Haptic</button>
    <p>Requires iOS 18.0 - 26.4.<br>Must be a direct user tap.</p>

    <!-- The Hidden Switch Mechanism -->
    <input type="checkbox" id="haptic-switch" switch>
    <label for="haptic-switch" id="haptic-label"></label>

    <script>
        const btn = document.getElementById('trigger-btn');
        const label = document.getElementById('haptic-label');

        btn.addEventListener('click', () => {
            // Trigger the click on the LABEL, not the input directly.
            // WebKit requires the event to propagate through the label 
            // to fire the non-standard haptic pulse.
            label.click();
            
            console.log("Haptic trigger attempted");
        });
    </script>
</body>
</html>
