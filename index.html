<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Native API Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; text-align: center; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 30px; text-align: center; max-width: 280px; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            text-align: center;
            background-color: #34c759; /* Green Theme */
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3);
        }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <h2>⚡ Native API Test</h2>
    <p>Testing if your phone's updated engine supports the official navigator.vibrate framework.</p>

    <button id="vibrateApiBtn" class="btn">📳 Run Native API Test</button>

    <script>
        document.getElementById('vibrateApiBtn').addEventListener('click', () => {
            if (navigator.vibrate) {
                // Tells the hardware to vibrate continuously for 3 full seconds (3000ms)
                navigator.vibrate(3000);
            } else {
                alert("The web engine still indicates that standard navigator.vibrate is completely disabled.");
            }
        });
    </script>

</body>
</html>
