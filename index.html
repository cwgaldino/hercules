<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Pseudo-Vibration</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f0f0f0;
        }
        button {
            padding: 20px 40px;
            font-size: 18px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
        }
        /* Hidden Switch Mechanism */
        #haptic-switch {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        #haptic-label { display: none; }
        .status { margin-top: 20px; color: #666; }
    </style>
</head>
<body>

    <button id="start-btn">Hold for 'Vibration'</button>
    <p class="status">Works on iOS 18–26.4 only.<br>iOS 26.5+ blocks this.</p>

    <input type="checkbox" id="haptic-switch" switch>
    <label for="haptic-switch" id="haptic-label"></label>

    <script>
        const btn = document.getElementById('start-btn');
        const label = document.getElementById('haptic-label');
        let intervalId = null;

        // Function to trigger a single tick
        const triggerTick = () => label.click();

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent mouse emulation
            triggerTick(); // Immediate feedback
            // Attempt to simulate continuous vibration by ticking rapidly
            // This feels like a rattle, not a buzz.
            intervalId = setInterval(triggerTick, 50); 
        });

        const stopVibration = (e) => {
            if (e.cancelable) e.preventDefault();
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
        };

        btn.addEventListener('touchend', stopVibration);
        btn.addEventListener('touchcancel', stopVibration);
        btn.addEventListener('mouseup', stopVibration);
        btn.addEventListener('mouseleave', stopVibration);
    </script>
</body>
</html>
