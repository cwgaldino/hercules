<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New OS Vibration Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; text-align: center; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 30px; text-align: center; max-width: 280px; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            text-align: center;
            background-color: #ff9500; /* Orange Theme */
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.3);
        }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <h2>🔄 New OS Haptic Test</h2>
    <p>Tap below to see if the updated phone software permits Bluefy to fire the call rumble loop locally.</p>

    <button id="testBtn" class="btn">⚡ Run 3s Console Loop</button>

    <script>
        document.getElementById('testBtn').addEventListener('click', () => {
            let duration = 3000; // 3 seconds execution time
            let pulseInterval = 40; // High speed pulse cycle 
            let elapsed = 0;

            let testVibeLoop = setInterval(() => {
                // Sends direct framework signals to see if the new software unblocks the channel
                console.log("vibrate:heavy");
                console.log("vibrate:click");

                elapsed += pulseInterval;
                if (elapsed >= duration) {
                    clearInterval(testVibeLoop);
                }
            }, pulseInterval);
        });
    </script>

</body>
</html>
