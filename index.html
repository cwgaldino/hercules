<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibration Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 30px; text-align: center; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
            text-align: center;
            text-decoration: none;
        }
        .btn-orange { background-color: #ff9500; }
        .btn-blue { background-color: #007aff; }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <h2>📳 iPhone Vibration Test</h2>

    <!-- TEST 1: Standard Web Vibrate Command -->
    <button id="webVibrateBtn" class="btn btn-orange">Test 1: Browser Vibrate</button>

    <!-- TEST 2: Native Apple Shortcut Link -->
    <a href="shortcuts://run-shortcut?name=VibrateThreeSeconds" class="btn btn-blue">Test 2: Shortcut Vibrate</a>

    <script>
        // TEST 1 Logic: Standard web vibration (Works on Android, usually blocked on iOS)
        document.getElementById('webVibrateBtn').addEventListener('click', () => {
            if (navigator.vibrate) {
                // Vibrate for 1 second, rest for 0.5 seconds, vibrate for 1 second
                navigator.vibrate([1000, 500, 1000]);
                alert("Browser vibrate command sent!");
            } else {
                alert("This browser completely blocks standard web vibrations.");
            }
        });
    </script>

</body>
</html>
