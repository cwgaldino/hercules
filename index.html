<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bluefy Native Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; text-align: center; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 30px; text-align: center; max-width: 280px; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            text-align: center;
            background-color: #ff9500; /* Orange Theme */
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.3);
            transition: opacity 0.2s ease;
        }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <h2>📳 Bluefy Backdoor Test</h2>
    <p>This button tests Bluefy's direct messaging pipeline. It should shake your phone instantly without ever leaving the screen.</p>

    <!-- Haptic Trigger Button -->
    <button id="triggerBtn" class="btn">⚡ Trigger 3s Local Rumble</button>

    <script>
        const triggerBtn = document.getElementById('triggerBtn');

        // Bypasses iOS entirely by using Bluefy's custom built-in message broker
        function runBluefyRumble() {
            try {
                // Check for Bluefy's custom browser layout controller object
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.vibrate) {
                    // Instruct the phone's native shell framework to execute a 3000ms vibration
                    window.webkit.messageHandlers.vibrate.postMessage(3000);
                } else {
                    // Fallback log strategy for older software variants
                    let duration = 3000;
                    let elapsed = 0;
                    let interval = setInterval(() => {
                        console.log("vibrate:heavy");
                        elapsed += 50;
                        if (elapsed >= duration) clearInterval(interval);
                    }, 50);
                    alert("WebKit handler missing. Running console fallback. Ensure you are using Bluefy!");
                }
            } catch (e) {
                alert("Error targeting native framework: " + e.message);
            }
        }

        // Generates a quick 1-second crisp high pitch pitch buzzer alert tone
        function playLocalBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(950, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 1.0);
            } catch (e) {
                console.log("Audio thread lock:", e);
            }
        }

        triggerBtn.addEventListener('click', () => {
            // Trigger audio and hardware mechanics simultaneously right on user interaction tap
            playLocalBeep();
            runBluefyRumble();
        });
    </script>

</body>
</html>
