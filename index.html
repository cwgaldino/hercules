<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Timer Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; text-align: center; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 30px; text-align: center; max-width: 280px; }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            background-color: #ff9500; /* Orange Theme */
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.3);
            transition: opacity 0.2s ease;
        }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <h2>⏱️ Shortcut Timer Test</h2>
    <p>This button tests if your iPhone can count down 2 seconds natively and trigger the call rattle.</p>

    <!-- Handoff trigger button -->
    <button id="testBtn" class="btn">🚀 Start 2s Test Timer</button>

    <script>
        document.getElementById('testBtn').addEventListener('click', () => {
            // Sends the number 2 as the native text input straight into the GymTimer shortcut workflow
            window.location.href = "shortcuts://run-shortcut?name=GymTimer&input=2";
        });
    </script>

</body>
</html>
